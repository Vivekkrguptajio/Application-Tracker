spring.application.name=demo

# ── Database Configuration ──
# Use environment variables for security; fallback to defaults for local dev
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:6543/postgres?prepareThreshold=0}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password_placeholder}

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Server ──
server.port=8080

# ── CORS (comma-separated origins) ──
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000,https://application-tracker-1-qdtg.onrender.com}

# ── Jackson (JSON serialization) ──
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Kolkata

groq.api.key=${GROQ_API_KEY:gsk_placeholder_please_set_this}